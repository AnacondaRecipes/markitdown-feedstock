{% set name = "markitdown" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: da97a55a45a3d775ea758e88a344d5cac94ee97115fb0293f99027d32c2fc3f6

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<38]
  python:
    entry_points:
      - markitdown = markitdown.__main__:main

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python
    - beautifulsoup4
    - requests
    - markdownify
    - magika >=0.6.1,<0.7.dev0
    - charset-normalizer

test:
  imports:
    - markitdown
  requires:
    - pip
  commands:
    - pip check

about:
  summary: Utility tool for converting various files to Markdown
  license: MIT
  license_file: LICENSE
  license_family: MIT
  home: https://github.com/microsoft/markitdown
  description: |
    Python tool for converting files and office documents to Markdown.
  doc_url: https://github.com/microsoft/markitdown
  dev_url: https://github.com/microsoft/markitdown

extra:
  recipe-maintainers:
    - johnhany97
    - sarthakpati
